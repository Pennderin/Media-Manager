<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08090d">
  <title>Media Companion</title>
  <link rel="manifest" href="/companion/manifest.json">
  <link rel="apple-touch-icon" href="/companion/icon-192.png">
  <link rel="stylesheet" href="styles/theme.css">
  <script type="module" src="mm-components.js"></script>
  <script type="module" src="components/app-shell.js"></script>
  <script type="module" src="components/search-view.js"></script>
  <script type="module" src="components/requests-view.js"></script>
  <script type="module" src="components/top20-view.js"></script>
  <script type="module" src="components/settings-view.js"></script>
</head>
<body>
  <app-shell></app-shell>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/companion/sw.js').catch(() => {});
    }

    // Prevent iOS PWA from shifting/scrolling the page on touch.
    // Allow scrolling only inside containers that actually have overflow content.
    document.addEventListener('touchmove', function(e) {
      for (const node of e.composedPath()) {
        if (node === document || node === window) break;
        if (node.nodeType === 1 && node.scrollHeight > node.clientHeight) {
          const ov = getComputedStyle(node).overflowY;
          if (ov === 'auto' || ov === 'scroll') return;
        }
      }
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
