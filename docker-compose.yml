# ═══════════════════════════════════════════════════════════════════
# Media Manager — Docker Compose
# Run both the server and companion on your NAS
# ═══════════════════════════════════════════════════════════════════
#
# QUICK START:
#   1. Copy config.template.json → config/config.json
#   2. Fill in your seedbox, Prowlarr, and TMDB settings
#   3. Adjust the volume paths below to match YOUR NAS layout
#   4. docker-compose up -d
#
# ═══════════════════════════════════════════════════════════════════

services:
  media-manager:
    build: ./media-manager-server
    container_name: media-manager
    restart: unless-stopped
    ports:
      - "9876:9876"
    volumes:
      # Config — persists settings between container restarts
      - ./config:/config

      # Staging — temporary workspace for downloads before renaming/moving
      # This should be a fast drive (SSD preferred) with enough space for
      # your largest download. It gets cleaned up after each pipeline job.
      - /mnt/user/downloads/staging:/staging

      # NAS media libraries — where your final media ends up
      # Map these to your actual Plex/Jellyfin library paths
      - /mnt/user/media/Movies:/media/movies
      - /mnt/user/media/TV Shows:/media/tv
      - /mnt/user/media/Kids Movies:/media/kids-movies
      - /mnt/user/media/Asian Movies:/media/asian-movies
      - /mnt/user/media/Asian Shows:/media/asian-shows
      - /mnt/user/media/Anime Movies:/media/anime-movies
      - /mnt/user/media/Anime Shows:/media/anime-shows
    environment:
      - PORT=9876
      - CONFIG_DIR=/config
      - LOG_LEVEL=info
      - TZ=America/New_York

  media-companion:
    build: ./media-companion-docker
    container_name: media-companion
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
    environment:
      - PORT=3000
      - CONFIG_DIR=/config
      - MANAGER_URL=http://media-manager:9876
      - TZ=America/New_York
    depends_on:
      - media-manager
