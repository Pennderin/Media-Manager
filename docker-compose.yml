# ═══════════════════════════════════════════════════════════════════
# Media Manager — Docker Compose
# Manual grab pipeline: magnet → qBit → library → TMDB rename
# ═══════════════════════════════════════════════════════════════════
#
# QUICK START:
#   1. Adjust the volume paths below to match YOUR NAS layout
#   2. docker-compose up -d
#   3. Open http://YOUR_NAS_IP:9876/admin and fill in Settings
#
# ═══════════════════════════════════════════════════════════════════

services:
  media-manager:
    build: .
    container_name: media-manager
    restart: unless-stopped
    ports:
      - "9876:9876"
    volumes:
      # Config — persists settings between container restarts
      - ./config:/config

      # Torrents — qBittorrent's download directory
      # Must match qBit's save path. The container path (/torrents)
      # goes in Settings → qBittorrent → Download Path
      - /mnt/user/Torrents:/torrents

      # ── Media Libraries ─────────────────────────────────────────
      # One mount per library. The container path (right side) is
      # what you enter in Settings → Library Paths.
      #
      # Required:
      - /mnt/user/Plex/Movies:/media/movies
      - /mnt/user/Plex/TV Shows:/media/tv
      #
      # Optional — uncomment and adjust as needed:
      # - /mnt/user/Plex/Kids Movies:/media/kids-movies
      # - /mnt/user/Plex/Anime Movies:/media/anime-movies
      # - /mnt/user/Plex/Anime Shows:/media/anime-shows
      # - /mnt/user/Plex/Asian Movies:/media/asian-movies
      # - /mnt/user/Plex/Asian Shows:/media/asian-shows
    environment:
      - TZ=America/New_York
      - LOG_LEVEL=info
